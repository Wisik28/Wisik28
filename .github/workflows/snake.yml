name: Generate Snake Animation

on:
  # Menjalankan script secara otomatis setiap 24 jam
  schedule:
    - cron: "0 0 * * *"
  
  # Memungkinkan Anda untuk menjalankan script secara manual
  workflow_dispatch:
  
  # Menjalankan script setiap kali ada perubahan pada branch main
  push:
    branches:
    - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      # Action ini yang akan membuat animasi ularnya
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      # Action ini yang akan mengunggah (push) hasil gambar ke branch 'output'
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
